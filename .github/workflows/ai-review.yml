name: AI Review

on:
  push:
    paths:
      - '**.cc'
      - '**.cpp'
      - '**.py'

permissions:
  contents: write

jobs:
  review:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: install deps
        run: |
          pip install openai

      - name: skip if auto review commit
        run: |
          msg=$(git log -1 --pretty=%B)
          if [[ "$msg" == "auto ai review" ]]; then
            echo "skip"
            exit 0
          fi

      - name: get changed files
        id: changed
        run: |
          echo "FILES=$(git diff --name-only HEAD^ HEAD | grep -E '\.(cc|cpp|py)$' | xargs)" >> $GITHUB_OUTPUT

      - name: run review
        if: steps.changed.outputs.FILES != ''
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python .github/scripts/review.py "${{ steps.changed.outputs.FILES }}"      

      - name: commit md
        if: steps.changed.outputs.FILES != ''
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add .
          git commit -m "auto ai review" || echo "no changes"
          git push
