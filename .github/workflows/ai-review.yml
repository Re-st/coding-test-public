name: AI Review

on:
  push:
    paths:
      - '**.cc'
      - '**.cpp'
      - '**.py'
      - '.github/scripts/review.py'
      - '.github/workflows/ai-review.yml'

permissions:
  contents: write

concurrency:
  group: ai-review-${{ github.ref }}
  cancel-in-progress: false

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: install deps
        run: |
          pip install -U google-genai

      - name: list gemini models (debug)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python .github/scripts/review.py --list-models

      - name: sync with remote (prevent add/add conflicts)
        run: |
          git fetch origin "${GITHUB_REF_NAME}"
          git rebase "origin/${GITHUB_REF_NAME}" || (git rebase --abort && exit 1)

      - name: compute changed files (push only)
        id: changed
        env:
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          # BEFORE_SHA is all-zeros on the very first push or a force-push; skip diff in that case.
          if [[ "$BEFORE_SHA" == "0000000000000000000000000000000000000000" ]]; then
            echo "HAS_FILES=false" >> "$GITHUB_OUTPUT"
          else
            git -c core.quotepath=false diff --name-only "$BEFORE_SHA" "$AFTER_SHA" \
              | grep -E '\.(cc|cpp|py)$' \
              > "$RUNNER_TEMP/changed_files.txt"
            grep_rc=$?
            # grep exits 0 (matches found) or 1 (no matches); anything else is an error.
            [[ $grep_rc -le 1 ]] || exit $grep_rc
            if [[ -s "$RUNNER_TEMP/changed_files.txt" ]]; then
              echo "HAS_FILES=true" >> "$GITHUB_OUTPUT"
            else
              echo "HAS_FILES=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: decide bootstrap
        id: bootstrap
        run: |
          if [[ -f ".github/.ai_review_bootstrap_done" ]]; then
            echo "DO_BOOTSTRAP=false" >> $GITHUB_OUTPUT
          else
            echo "DO_BOOTSTRAP=true" >> $GITHUB_OUTPUT
          fi

      - name: run bootstrap (one-time)
        if: steps.bootstrap.outputs.DO_BOOTSTRAP == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python .github/scripts/review.py --bootstrap

      - name: run review (push files only)
        if: steps.bootstrap.outputs.DO_BOOTSTRAP != 'true' && steps.changed.outputs.HAS_FILES == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python .github/scripts/review.py --files-from "$RUNNER_TEMP/changed_files.txt"

      - name: commit md (push with retry)
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add .
          # Exit early if nothing to commit; remote was already synced in the earlier sync step.
          git commit -m "auto ai review" || { echo "no changes"; exit 0; }

          for attempt in 1 2 3; do
            if git push origin "${GITHUB_REF_NAME}"; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "push failed after 3 attempts"
              exit 1
            fi
            echo "push rejected (attempt $attempt/3), rebasing onto latest remote..."
            git fetch origin "${GITHUB_REF_NAME}"
            # -X theirs keeps the locally generated REVIEW.md when add/add conflicts occur
            # (in rebase, 'theirs' refers to the commits being replayed, i.e. our local content).
            # This is safe because the only files that can conflict here are auto-generated reviews.
            git rebase "origin/${GITHUB_REF_NAME}" -X theirs || (git rebase --abort && exit 1)
          done
